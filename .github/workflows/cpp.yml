---
name: cpp
"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  cpp:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update
      - run: sudo apt-get install --yes libboost-all-dev=1.83.*
      - run: make style
      - run: make fast
      - run: make fast-test
      - run: make slow
      - run: make slow-test
      - run: make clean
