---
name: Eolang
"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 19
      - run: npm install -g eolang
      - run: |
          EO_ROOT=$(npm root -g)/eolang
          echo "0.61.1" > "$EO_ROOT/eo-version.txt"
          echo "0.61.1" > "$EO_ROOT/home-tag.txt"
      - run: make eo
      - run: make clean
