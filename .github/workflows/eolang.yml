---
name: eolang
"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  make:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: npm install -g eolang@0.36.0
      - run: make eo
      - run: make -C eo test
      - run: make clean
